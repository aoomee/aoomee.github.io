<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drew Tools</title>

<style>
body {
  margin: 0;
  background: #e6e6e6;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.wrapper {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.card {
  width: 1100px;
  height: 600px;
  background: #ffffff;
  border-radius: 24px;
  padding: 70px 80px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.08);
  position: relative;
  display: flex;
  flex-direction: column;
}

.logo {
  font-size: 18px;
  letter-spacing: 6px;
  font-weight: 600;
  margin-bottom: 80px;
}

.content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex: 1;
}

.left {
  max-width: 500px;
}

.left h1 {
  font-size: 56px;
  margin: 0 0 30px;
}

.left p {
  font-size: 18px;
  color: #6b6b6b;
  line-height: 1.7;
}

.button {
  margin-top: 40px;
  display: inline-block;
  padding: 16px 40px;
  background: #111;
  color: #fff;
  border-radius: 40px;
  text-decoration: none;
  font-size: 16px;
}

.right img {
  width: 500px;
  max-height: 450px;
  object-fit: contain;
}

@media (max-width: 1000px) {
  .card {
    width: 90%;
    height: auto;
    padding: 40px;
  }

  .content {
    flex-direction: column;
  }

  .right img {
    width: 100%;
    margin-top: 40px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="logo">DREW TOOLS</div>

    <div class="content">

      <div class="left">
        <h1>Rotary Burr</h1>
        <p>
        High precision solid carbide rotary burr for industrial grinding and shaping.
        Available in 1.5 inch and 2.0 inch specifications.
        Electroplated diamond coating ensures durability and strong adhesion.
        </p>

        <a href="mailto:your@email.com" class="button">Contact Now</a>
      </div>

      <div class="right">
        <img src="burr.jpg" alt="Product">
      </div>

    </div>

  </div>
</div>

</body>
</html>
