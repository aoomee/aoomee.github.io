<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drew Tools</title>

<style>
body {
  margin: 0;
  background: #e9e9e9;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  width: 1000px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 30px 60px rgba(0,0,0,0.08);
  padding: 60px;
  position: relative;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 60px;
}

.logo {
  font-weight: 600;
  letter-spacing: 4px;
  font-size: 18px;
}

.content {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.text {
  max-width: 420px;
}

.text h1 {
  font-size: 42px;
  margin: 0 0 20px;
}

.text p {
  color: #666;
  line-height: 1.6;
}

.button {
  margin-top: 30px;
  display: inline-block;
  padding: 12px 28px;
  background: #111;
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-size: 14px;
}

.image img {
  width: 450px;
}

@media (max-width: 900px) {
  .card {
    width: 90%;
    padding: 40px;
  }

  .content {
    flex-direction: column;
  }

  .image img {
    width: 100%;
    margin-top: 40px;
  }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="header">
      <div class="logo">DREW TOOLS</div>
    </div>

    <div class="content">

      <div class="text">
        <h1>Rotary Burr</h1>
        <p>
        High precision solid carbide rotary burr for industrial grinding and shaping.
        Available in 1.5 inch and 2.0 inch specifications.
        Electroplated diamond coating ensures durability and strong adhesion.
        </p>

        <a href="#" class="button">Contact Now</a>
      </div>

      <div class="image">
        <img src="https://via.placeholder.com/450x450.png?text=Product+Image" alt="Product">
      </div>

    </div>

  </div>
</div>

</body>
</html>
